<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}保險員證照考試平台{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  {% block navbar %}
  {% if session.get('user_id') %}
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">⚖</span>
      <span class="brand-text">保險考照</span>
    </div>
    <div class="navbar-right">
      <span class="username">{{ session.get('username', '') }}</span>
      <a href="{{ url_for('logout') }}" class="nav-logout">登出</a>
    </div>
  </nav>
  {% endif %}
  {% endblock %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
